name: AI Builders Daily Digest

on:
  schedule:
    # GitHub free tier delays scheduled jobs by ~4 hours.
    # To hit 9:00 AM Beijing (01:00 UTC), set cron to 21:00 UTC the day before.
    # 21:00 UTC + ~4h delay = ~01:00 UTC = ~9:00 AM Beijing.
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Send digests for all users
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          cd scripts

          # Find all user config files
          USER_FILES=$(ls ../users/*.json 2>/dev/null || echo "")
          if [ -z "$USER_FILES" ]; then
            echo "No user configs found in users/"
            exit 0
          fi

          for USER_FILE in $USER_FILES; do
            USER_ID=$(basename "$USER_FILE" .json)
            USER_EMAIL=$(python3 -c "import json; print(json.load(open('$USER_FILE'))['email'])")
            echo ""
            echo "========== Processing user: $USER_ID ($USER_EMAIL) =========="

            # Step 1: Prepare personalized feed
            node prepare-digest.js --user "$USER_ID" > /tmp/feed-$USER_ID.json 2>/tmp/prep-err-$USER_ID.txt
            if [ $? -ne 0 ]; then
              echo "ERROR: prepare failed for $USER_ID"
              cat /tmp/prep-err-$USER_ID.txt
              continue
            fi
            echo "Feed prepared: $(wc -c < /tmp/feed-$USER_ID.json) bytes"

            # Step 2: Remix with Gemini
            node remix-digest.js < /tmp/feed-$USER_ID.json > /tmp/digest-$USER_ID.md 2>/tmp/remix-err-$USER_ID.txt
            if [ $? -ne 0 ]; then
              echo "ERROR: remix failed for $USER_ID"
              cat /tmp/remix-err-$USER_ID.txt
              continue
            fi
            echo "Digest generated: $(wc -c < /tmp/digest-$USER_ID.md) bytes"
            head -3 /tmp/digest-$USER_ID.md

            # Step 3: Deliver via email
            FB_DELIVERY_METHOD=email FB_DELIVERY_EMAIL="$USER_EMAIL" \
              node deliver.js --file /tmp/digest-$USER_ID.md 2>&1
            echo "Sent to $USER_EMAIL"
          done

          echo ""
          echo "========== All users processed =========="
