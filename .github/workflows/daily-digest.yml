name: AI Builders Daily Digest

on:
  # Scheduled via cron-job.org -> GitHub API (more reliable than GitHub's built-in cron)
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Prepare feed
        env:
          FB_LANGUAGE: zh
        run: |
          cd scripts
          node prepare-digest.js > /tmp/feed.json
          echo "Feed size: $(wc -c < /tmp/feed.json) bytes"
          python3 -c "import json; d=json.load(open('/tmp/feed.json')); print(f'Podcasts: {d[\"stats\"][\"podcastEpisodes\"]}, Builders: {d[\"stats\"][\"xBuilders\"]}, Tweets: {d[\"stats\"][\"totalTweets\"]}')" || echo "Failed to parse feed JSON"

      - name: Remix with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd scripts
          node remix-digest.js < /tmp/feed.json > /tmp/digest.md
          echo "Digest size: $(wc -c < /tmp/digest.md) bytes"
          head -5 /tmp/digest.md

      - name: Deliver via email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FB_DELIVERY_METHOD: email
          FB_DELIVERY_EMAIL: ${{ secrets.DELIVERY_EMAIL }}
        run: |
          cd scripts
          node deliver.js --file /tmp/digest.md 2>&1
