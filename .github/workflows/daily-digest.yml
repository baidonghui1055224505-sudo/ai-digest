name: "AI Builders Daily Digest"

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check time window and dedup
        id: check
        run: |
          H=$(TZ=Asia/Shanghai date +%H)
          M=$(TZ=Asia/Shanghai date +%M)
          D=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          echo "Beijing: ${H}:${M}"

          IN=false
          [ "$H" = "08" ] && [ "$M" -ge 45 ] && IN=true
          [ "$H" = "09" ] && [ "$M" -le 15 ] && IN=true

          if [ "$IN" = false ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST=$(curl -sf -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/baidonghui1055224505-sudo/ai-digest/actions/runs?per_page=10&status=success" \
            2>/dev/null | python3 -c "
import json,sys
for r in json.load(sys.stdin).get('workflow_runs',[]):
    if r.get('name','')=='AI Builders Daily Digest':
        print(r.get('created_at','')[:10]); break
" 2>/dev/null || echo "never")

          echo "Last success: $LAST Today: $D"
          if [ "$LAST" = "$D" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.should_run == 'true'
      - uses: actions/setup-node@v4
        if: steps.check.outputs.should_run == 'true'
        with:
          node-version: "20"
      - name: Install deps
        if: steps.check.outputs.should_run == 'true'
        run: cd scripts && npm install
      - name: Send digests
        if: steps.check.outputs.should_run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          cd scripts
          for f in ../users/*.json; do
            [ ! -f "$f" ] && continue
            id=$(basename "$f" .json)
            email=$(python3 -c "import json;print(json.load(open('$f'))['email'])")
            echo "=== $id ($email) ==="
            node prepare-digest.js --user "$id" > /tmp/feed.json 2>/tmp/e.txt || { cat /tmp/e.txt; continue; }
            node remix-digest.js < /tmp/feed.json > /tmp/digest.md 2>/tmp/e2.txt || { cat /tmp/e2.txt; continue; }
            head -1 /tmp/digest.md
            FB_DELIVERY_METHOD=email FB_DELIVERY_EMAIL="$email" node deliver.js --file /tmp/digest.md
            echo "[OK] $email"
          done
